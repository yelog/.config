# 鼠鬚管个性化配置
# encoding: utf-8

patch:
  style/color_scheme: macos_light
  style/color_scheme_dark: macos_dark
  style/candidate_list_layout: linear  # 候选项横向排列（stacked=竖向, linear=横向）
  style/text_orientation: horizontal
  style/inline_preedit: true
  style/inline_candidate: false
  style/candidate_format: "[label] [candidate] [comment] "
  style/font_face: "PingFang SC"
  style/font_point: 16
  style/label_font_face: "SF Pro"
  style/label_font_point: 12
  style/comment_font_face: "PingFang SC"
  style/comment_font_point: 13
  style/corner_radius: 9
  style/hilited_corner_radius: 0
  style/border_height: -2
  style/border_width: -2
  style/line_spacing: 6
  style/spacing: 8
  style/shadow_size: 0
  style/memorize_size: true
  style/mutual_exclusive: true
  style/translucency: false

  preset_color_schemes/macos_light:
    name: "macOS Light"
    author: "custom"
    back_color: 0xFBFBFB
    border_color: 0xFBFBFB
    text_color: 0x242424
    hilited_text_color: 0x242424
    candidate_text_color: 0x242424
    label_color: 0x969696
    comment_text_color: 0x8A8A8A
    hilited_candidate_back_color: 0xFBFBFB
    hilited_candidate_text_color: 0xD66B00
    hilited_candidate_label_color: 0xD66B00
    hilited_comment_text_color: 0x707070

  preset_color_schemes/macos_dark:
    name: "macOS Dark"
    author: "custom"
    back_color: 0x2C2C2C
    border_color: 0x2C2C2C
    text_color: 0xF2F2F2
    hilited_text_color: 0xF2F2F2
    candidate_text_color: 0xF2F2F2
    label_color: 0xA8A8A8
    comment_text_color: 0xA0A0A0
    hilited_candidate_back_color: 0x2C2C2C
    hilited_candidate_text_color: 0xFFB340
    hilited_candidate_label_color: 0xFFB340
    hilited_comment_text_color: 0xB8B8B8
